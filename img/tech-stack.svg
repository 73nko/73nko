<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 80" width="840">
  <defs>
    <!-- Purple glow for TypeScript, React -->
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue glow for Node.js, Rust -->
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <!-- Teal glow for Next.js, GraphQL -->
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- === TypeScript === -->
  <g transform="translate(180, 40)">
    <circle cx="0" cy="0" r="30" fill="url(#glowPurple)"/>
    <g transform="translate(-18, -18)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="none" stroke="#e6edf3" stroke-width="1.8"/>
      <text x="18" y="24" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="16" font-weight="bold">TS</text>
    </g>
  </g>

  <!-- === React === -->
  <g transform="translate(276, 40)">
    <circle cx="0" cy="0" r="30" fill="url(#glowPurple)"/>
    <g transform="translate(0, 0)">
      <!-- Nucleus -->
      <circle cx="0" cy="0" r="3" fill="#e6edf3"/>
      <!-- Orbits -->
      <ellipse cx="0" cy="0" rx="16" ry="6" fill="none" stroke="#e6edf3" stroke-width="1.4"/>
      <ellipse cx="0" cy="0" rx="16" ry="6" fill="none" stroke="#e6edf3" stroke-width="1.4" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="16" ry="6" fill="none" stroke="#e6edf3" stroke-width="1.4" transform="rotate(120)"/>
    </g>
  </g>

  <!-- === Node.js === -->
  <g transform="translate(372, 40)">
    <circle cx="0" cy="0" r="30" fill="url(#glowBlue)"/>
    <g transform="translate(0, 0)">
      <!-- Hexagon -->
      <polygon points="0,-18 15.6,-9 15.6,9 0,18 -15.6,9 -15.6,-9" fill="none" stroke="#e6edf3" stroke-width="1.6" stroke-linejoin="round"/>
      <!-- N letter -->
      <text x="0" y="6" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="16" font-weight="bold">N</text>
    </g>
  </g>

  <!-- === Rust === -->
  <g transform="translate(468, 40)">
    <circle cx="0" cy="0" r="30" fill="url(#glowBlue)"/>
    <g transform="translate(0, 0)">
      <!-- Gear/cog outer ring -->
      <circle cx="0" cy="0" r="16" fill="none" stroke="#e6edf3" stroke-width="1.6"/>
      <!-- Gear teeth (12 teeth) -->
      <g fill="#e6edf3">
        <rect x="-1.5" y="-19" width="3" height="5" rx="0.5"/>
        <rect x="-1.5" y="-19" width="3" height="5" rx="0.5" transform="rotate(30)"/>
        <rect x="-1.5" y="-19" width="3" height="5" rx="0.5" transform="rotate(60)"/>
        <rect x="-1.5" y="-19" width="3" height="5" rx="0.5" transform="rotate(90)"/>
        <rect x="-1.5" y="-19" width="3" height="5" rx="0.5" transform="rotate(120)"/>
        <rect x="-1.5" y="-19" width="3" height="5" rx="0.5" transform="rotate(150)"/>
        <rect x="-1.5" y="-19" width="3" height="5" rx="0.5" transform="rotate(180)"/>
        <rect x="-1.5" y="-19" width="3" height="5" rx="0.5" transform="rotate(210)"/>
        <rect x="-1.5" y="-19" width="3" height="5" rx="0.5" transform="rotate(240)"/>
        <rect x="-1.5" y="-19" width="3" height="5" rx="0.5" transform="rotate(270)"/>
        <rect x="-1.5" y="-19" width="3" height="5" rx="0.5" transform="rotate(300)"/>
        <rect x="-1.5" y="-19" width="3" height="5" rx="0.5" transform="rotate(330)"/>
      </g>
      <!-- R letter -->
      <text x="0" y="6" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="15" font-weight="bold">R</text>
    </g>
  </g>

  <!-- === Next.js === -->
  <g transform="translate(564, 40)">
    <circle cx="0" cy="0" r="30" fill="url(#glowTeal)"/>
    <g transform="translate(0, 0)">
      <!-- Circle -->
      <circle cx="0" cy="0" r="17" fill="none" stroke="#e6edf3" stroke-width="1.6"/>
      <!-- N letter -->
      <text x="0" y="6" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="16" font-weight="bold">N</text>
    </g>
  </g>

  <!-- === GraphQL === -->
  <g transform="translate(660, 40)">
    <circle cx="0" cy="0" r="30" fill="url(#glowTeal)"/>
    <g transform="translate(0, 0)">
      <!-- Hexagonal shape -->
      <polygon points="0,-17 14.7,-8.5 14.7,8.5 0,17 -14.7,8.5 -14.7,-8.5" fill="none" stroke="#e6edf3" stroke-width="1.4" stroke-linejoin="round"/>
      <!-- Node dots at vertices -->
      <circle cx="0" cy="-17" r="2.5" fill="#e6edf3"/>
      <circle cx="14.7" cy="-8.5" r="2.5" fill="#e6edf3"/>
      <circle cx="14.7" cy="8.5" r="2.5" fill="#e6edf3"/>
      <circle cx="0" cy="17" r="2.5" fill="#e6edf3"/>
      <circle cx="-14.7" cy="8.5" r="2.5" fill="#e6edf3"/>
      <circle cx="-14.7" cy="-8.5" r="2.5" fill="#e6edf3"/>
      <!-- Inner cross lines -->
      <line x1="0" y1="-17" x2="14.7" y2="8.5" stroke="#e6edf3" stroke-width="1" stroke-opacity="0.5"/>
      <line x1="0" y1="-17" x2="-14.7" y2="8.5" stroke="#e6edf3" stroke-width="1" stroke-opacity="0.5"/>
      <line x1="-14.7" y1="-8.5" x2="14.7" y2="-8.5" stroke="#e6edf3" stroke-width="1" stroke-opacity="0.5"/>
    </g>
  </g>
</svg>